services:
  db:
    image: postgres:15-alpine
    container_name: saas_clinico_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecretpassword}
      POSTGRES_DB: ${DB_NAME:-saas_clinica_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - '${DB_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-saas_clinica_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4.8.1
    container_name: saas_clinico_adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    profiles: ['debug']
    ports:
      - '${ADMINER_PORT:-8080}:8080'

volumes:
  postgres_data:
